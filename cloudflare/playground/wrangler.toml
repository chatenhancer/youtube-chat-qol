name = "chat-enhancer-playground"
main = "src/index.ts"
compatibility_date = "2026-06-09"
workers_dev = false

routes = [
  { pattern = "playground.chatenhancer.com", custom_domain = true }
]

[observability]
enabled = true
head_sampling_rate = 1

[observability.logs]
invocation_logs = false

[vars]
ALLOWED_ORIGIN_PATTERNS = "https://chatenhancer.com,https://www.chatenhancer.com,chrome-extension://,moz-extension://,http://localhost:,http://127.0.0.1:"
STOCKFISH_ELO = "1700"
STOCKFISH_MOVE_TIME_MS = "500"

[[durable_objects.bindings]]
name = "STREAM_ROOMS"
class_name = "StreamRoom"

[[durable_objects.bindings]]
name = "STOCKFISH_ENGINE"
class_name = "StockfishContainer"

[[durable_objects.bindings]]
name = "PLAYER_STATS"
class_name = "PlayerStats"

[[containers]]
class_name = "StockfishContainer"
image = "./src/durable-objects/stockfish-container/Dockerfile"
instance_type = "basic"
max_instances = 1

[[migrations]]
tag = "v1"
new_sqlite_classes = ["StreamRoom"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["StockfishContainer"]

[[migrations]]
tag = "v3"
new_sqlite_classes = ["ComputerPlayer"]

[[migrations]]
tag = "v4"
deleted_classes = ["ComputerPlayer"]

[[migrations]]
tag = "v5"
new_sqlite_classes = ["PlayerStats"]
