<!doctype html>
<html lang="en">
  <head>
    <!--
      Extension action popup.
      This offers an out-of-chat settings surface for users who prefer Chrome's
      toolbar popup over YouTube's injected live-chat settings menu.
    -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Chat Enhancer for YouTube</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main>
      <header class="header">
        <h1 class="brand">
          <img src="logo.png" alt="Chat Enhancer for YouTube">
        </h1>
        <p id="version" class="version" aria-label="Extension version"></p>
      </header>

      <label class="field" title="Choose the language chat messages should be translated into. Off disables automatic translation.">
        <span class="option-title">
          <svg class="option-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path d="M12.87 15.07l-2.54-2.51.03-.03A17.52 17.52 0 0014.07 6H17V4h-7V2H8v2H1v2h11.17a15.7 15.7 0 01-2.86 4.63A15.07 15.07 0 017.22 7H5.2a17.2 17.2 0 002.77 5.03l-5.09 5.02L4.3 18.47l5.01-5.01 3.11 3.11.45-1.5ZM18.5 10h-2L12 22h2l1.13-3h4.74L21 22h2l-4.5-12Zm-2.62 7l1.62-4.33L19.12 17h-3.24Z"></path>
          </svg>
          <span>Translate to</span>
        </span>
        <select id="targetLanguage" title="Choose the language chat messages should be translated into. Off disables automatic translation."></select>
      </label>

      <label class="field" title="Choose whether translations replace the original message or appear below it.">
        <span class="option-title">
          <svg class="option-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path d="M4 4h16a2 2 0 012 2v12a2 2 0 01-2 2H4a2 2 0 01-2-2V6a2 2 0 012-2Zm0 2v12h16V6H4Zm2 8h5v2H6v-2Zm7 0h5v2h-5v-2Zm-7-4h12v2H6v-2Z"></path>
          </svg>
          <span>Translation display</span>
        </span>
        <select id="translationDisplay" title="Choose whether translations replace the original message or appear below it.">
          <option value="replace">Replace message</option>
          <option value="below">Show below</option>
        </select>
      </label>

      <label class="field" title="Maximum characters included when quoting a message from chat actions or cards.">
        <span class="option-title">
          <svg class="option-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path d="M7.17 6A5.17 5.17 0 002 11.17V18h7v-7H5.06A2.17 2.17 0 017.17 9H9V6H7.17Zm10 0A5.17 5.17 0 0012 11.17V18h7v-7h-3.94A2.17 2.17 0 0117.17 9H19V6h-1.83Z"></path>
          </svg>
          <span>Quote length</span>
        </span>
        <input id="quoteMaxLength" type="number" min="40" max="240" step="10" title="Maximum characters included when quoting a message from chat actions or cards.">
      </label>

      <label class="row" title="Open YouTube channel pages in a smaller popup window instead of a normal browser tab.">
        <input id="openProfilesInPopup" type="checkbox" title="Open YouTube channel pages in a smaller popup window instead of a normal browser tab.">
        <span class="option-title">
          <svg class="option-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path d="M14 3h7v7h-2V6.41l-9.29 9.3-1.42-1.42 9.3-9.29H14V3ZM5 5h6v2H5v12h12v-6h2v6a2 2 0 01-2 2H5a2 2 0 01-2-2V7a2 2 0 012-2Z"></path>
          </svg>
          <span>Open channels in popup</span>
        </span>
      </label>

      <label class="row" title="Play a short sound when a chat message mentions your handle.">
        <input id="mentionSound" type="checkbox" title="Play a short sound when a chat message mentions your handle.">
        <span class="option-title">
          <svg class="option-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path d="M12 3a4 4 0 00-4 4v3.2c0 1.15-.37 2.27-1.05 3.2L5.2 15.8A1.4 1.4 0 006.33 18h11.34a1.4 1.4 0 001.13-2.2l-1.75-2.4A5.43 5.43 0 0116 10.2V7a4 4 0 00-4-4Zm0 19a3 3 0 002.83-2h-5.66A3 3 0 0012 22Z"></path>
            <path class="mention-sound-ring" d="M19.7 4.3a1 1 0 00-1.4 1.4A8.92 8.92 0 0121 12a1 1 0 102 0 10.9 10.9 0 00-3.3-7.7ZM5.7 5.7a1 1 0 00-1.4-1.4A10.9 10.9 0 001 12a1 1 0 102 0 8.92 8.92 0 012.7-6.3Z"></path>
          </svg>
          <span>Play a sound when mentioned</span>
        </span>
      </label>

      <p class="hint">Translate to and mention sound also appear in YouTube's live chat settings menu for quick access.</p>
      <p class="hint">Mention and Quote appear in each message's chat actions menu.</p>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
