<!doctype html>
<html lang="en">
  <head>
    <!--
      Extension action popup.
      This offers an out-of-chat settings surface for users who prefer Chrome's
      toolbar popup over YouTube's injected live-chat settings menu.
    -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Chat Enhancer for YouTube</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main>
      <header class="header">
        <h1 class="brand">
          <a id="landingLink" class="brand-link" href="https://chatenhancer.com" title="Open Chat Enhancer website" data-i18n-title="openChatEnhancerWebsite">
            <img src="logo.png" alt="Chat Enhancer for YouTube">
          </a>
        </h1>
        <div class="header-actions">
          <a id="sourceCodeLink" class="header-icon-button source-code-button" href="https://www.chatenhancer.com/source" title="View source code" aria-label="View source code" data-i18n-title="openSourceCode" data-i18n-aria-label="openSourceCode">
            <svg class="source-icon" viewBox="0 -960 960 960" aria-hidden="true" focusable="false">
              <path d="m153-480 115 115q11 12 11.5 28.5T268-308q-12 12-28 12t-28-12L68-452q-12-12-12-28t12-28l144-144q12-12 28-12t28 12q12 12 12 28.5T268-595L153-480Zm203.5 300.5Q349-194 354-210l176-564q5-16 19.5-23.5T580-800q16 5 23.5 19.5T606-750L430-186q-5 16-19.5 23.5T380-160q-16-5-23.5-19.5ZM807-480 692-595q-12-12-12-28.5t12-28.5q12-12 28-12t28 12l144 144q12 12 12 28t-12 28L748-308q-12 12-28 12t-28-12q-12-12-12-28.5t12-28.5l115-115Z"></path>
            </svg>
          </a>
          <a id="supportLink" class="header-icon-button" href="https://www.chatenhancer.com/support" title="Support / Feedback" aria-label="Support and feedback" data-i18n-title="supportFeedback" data-i18n-aria-label="supportAndFeedback">
            <svg class="support-icon" viewBox="0 -960 960 960" aria-hidden="true" focusable="false">
              <path d="M480-200q66 0 113-47t47-113v-160q0-66-47-113t-113-47q-66 0-113 47t-47 113v160q0 66 47 113t113 47Zm-80-120h160v-80H400v80Zm0-160h160v-80H400v80Zm80 40Zm0 320q-65 0-120.5-32T272-240H160v-80h84q-3-20-3.5-40t-.5-40h-80v-80h80q0-20 .5-40t3.5-40h-84v-80h112q14-23 31.5-43t40.5-35l-64-66 56-56 86 86q28-9 57-9t57 9l88-86 56 56-66 66q23 15 41.5 34.5T688-640h112v80h-84q3 20 3.5 40t.5 40h80v80h-80q0 20-.5 40t-3.5 40h84v80H688q-32 56-87.5 88T480-120Z"></path>
            </svg>
          </a>
          <button id="resetExtension" class="header-icon-button reset-button" type="button" title="Reset all extension settings and local data" aria-label="Reset extension" data-i18n-title="resetAllExtensionData" data-i18n-aria-label="resetExtension">
            <svg class="reset-icon" viewBox="0 -960 960 960" aria-hidden="true" focusable="false">
              <path d="M440-520h80v-280q0-17-11.5-28.5T480-840q-17 0-28.5 11.5T440-800v280ZM200-360h560v-80H200v80Zm-58 240h98v-80q0-17 11.5-28.5T280-240q17 0 28.5 11.5T320-200v80h120v-80q0-17 11.5-28.5T480-240q17 0 28.5 11.5T520-200v80h120v-80q0-17 11.5-28.5T680-240q17 0 28.5 11.5T720-200v80h98l-40-160H182l-40 160Zm676 80H142q-39 0-63-31t-14-69l55-220v-80q0-33 23.5-56.5T200-520h160v-280q0-50 35-85t85-35q50 0 85 35t35 85v280h160q33 0 56.5 23.5T840-440v80l55 220q13 38-11.5 69T818-40Zm-58-400H200h560Zm-240-80h-80 80Z"></path>
            </svg>
          </button>
        </div>
      </header>

      <nav class="popup-tabs" role="tablist" aria-label="Popup sections" data-i18n-aria-label="popupSections">
        <button id="settingsTab" class="popup-tab popup-tab-active" type="button" role="tab" aria-selected="true" aria-controls="settingsPanel" data-popup-tab-target="settingsPanel" data-i18n="settings">Settings</button>
        <button id="bookmarksTab" class="popup-tab" type="button" role="tab" aria-selected="false" aria-controls="bookmarksPanel" data-popup-tab-target="bookmarksPanel" data-i18n="bookmarks">Bookmarks</button>
        <button id="playgroundTab" class="popup-tab" type="button" role="tab" aria-selected="false" aria-controls="playgroundPanel" data-popup-tab-target="playgroundPanel" data-i18n="playground">Playground</button>
      </nav>

      <div class="popup-tab-panels">
        <div id="settingsPanel" class="popup-tab-panel" role="tabpanel" aria-labelledby="settingsTab" data-popup-tab-panel>
          <section class="settings-section" aria-labelledby="translation-heading">
            <h2 id="translation-heading" data-i18n="translation">Translation</h2>

          <label class="option option-control" title="Choose the language chat messages should be translated into. &quot;Off&quot; disables automatic translation." data-i18n-title="chooseTranslationLanguageTitle">
            <span class="option-title">
              <span class="option-icon translation-target-icon" aria-hidden="true"></span>
              <span data-i18n="translateTo">Target language</span>
            </span>
            <span class="option-helper" data-i18n="translationOffHelper">Pick a language to enable automatic translation.</span>
            <select id="targetLanguage" title="Choose the language chat messages should be translated into. &quot;Off&quot; disables automatic translation." data-i18n-title="chooseTranslationLanguageTitle"></select>
          </label>

          <label class="option option-control" title="Choose whether translations replace the original message or appear below it." data-i18n-title="translationDisplayTitle">
            <span class="option-title">
              <svg class="option-icon translation-display-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                <path class="translation-display-frame" d="M4 4h16a2 2 0 012 2v12a2 2 0 01-2 2H4a2 2 0 01-2-2V6a2 2 0 012-2Zm0 2v12h16V6H4Z"></path>
                <path class="translation-display-line translation-display-line-top" d="M6 10h12v2H6v-2Z"></path>
                <path class="translation-display-line translation-display-line-left" d="M6 14h5v2H6v-2Z"></path>
                <path class="translation-display-line translation-display-line-right" d="M13 14h5v2h-5v-2Z"></path>
              </svg>
              <span data-i18n="display">Display</span>
            </span>
            <span class="option-helper" data-i18n="translationDisplayHelper">Replace the message or show the translation below.</span>
            <select id="translationDisplay" title="Choose whether translations replace the original message or appear below it." data-i18n-title="translationDisplayTitle">
              <option value="replace" data-i18n="replaceMessage">Replace</option>
              <option value="below" data-i18n="showBelow">Show below</option>
            </select>
          </label>
        </section>

        <section class="settings-section" aria-labelledby="appearance-heading">
          <h2 id="appearance-heading" data-i18n="appearance">Appearance</h2>

          <div class="option option-control theme-option" title="Choose a custom theme for YouTube chat." data-i18n-title="chatSkinTitle">
            <span class="option-title">
              <svg class="option-icon chat-skin-icon" viewBox="0 -960 960 960" aria-hidden="true" focusable="false">
                <path class="chat-skin-palette-body" d="M480-80q-82 0-155-31.5t-127.5-86Q143-252 111.5-325T80-480q0-83 32.5-156t88-127Q256-817 330-848.5T488-880q80 0 151 27.5t124.5 76q53.5 48.5 85 115T880-518q0 115-70 176.5T640-280h-74q-9 0-12.5 5t-3.5 11q0 12 15 34.5t15 51.5q0 50-27.5 74T480-80Zm0-80q9 0 14.5-5t5.5-13q0-14-15-33t-15-57q0-42 29-67t71-25h70q66 0 113-38.5T800-518q0-121-92.5-201.5T488-800q-136 0-232 93t-96 227q0 133 93.5 226.5T480-160Z"></path>
                <path class="chat-skin-palette-spot chat-skin-palette-spot-left" d="M303-457q17-17 17-43t-17-43q-17-17-43-17t-43 17q-17 17-17 43t17 43q17 17 43 17t43-17Z"></path>
                <path class="chat-skin-palette-spot chat-skin-palette-spot-top-left" d="M423-617q17-17 17-43t-17-43q-17-17-43-17t-43 17q-17 17-17 43t17 43q17 17 43 17t43-17Z"></path>
                <path class="chat-skin-palette-spot chat-skin-palette-spot-top-right" d="M623-617q17-17 17-43t-17-43q-17-17-43-17t-43 17q-17 17-17 43t17 43q17 17 43 17t43-17Z"></path>
                <path class="chat-skin-palette-spot chat-skin-palette-spot-right" d="M743-457q17-17 17-43t-17-43q-17-17-43-17t-43 17q-17 17-17 43t17 43q17 17 43 17t43-17Z"></path>
              </svg>
              <span id="chatSkinLabel" data-i18n="chatSkin">Theme</span>
            </span>
            <span class="option-helper" data-i18n="chatSkinHelper">Apply a custom theme to YouTube chat.</span>
            <select id="chatSkin" aria-labelledby="chatSkinLabel" title="Choose a custom theme for YouTube chat." data-i18n-title="chatSkinTitle"></select>
          </div>

          <label class="option option-toggle" title="Play short sounds for chat alerts." data-i18n-title="playAlertSoundsTitle">
            <span class="option-copy">
              <span class="option-title">
                <svg class="option-icon sound-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                  <path d="M12 3a4 4 0 00-4 4v3.2c0 1.15-.37 2.27-1.05 3.2L5.2 15.8A1.4 1.4 0 006.33 18h11.34a1.4 1.4 0 001.13-2.2l-1.75-2.4A5.43 5.43 0 0116 10.2V7a4 4 0 00-4-4Zm0 19a3 3 0 002.83-2h-5.66A3 3 0 0012 22Z"></path>
                  <path class="sound-ring" d="M19.7 4.3a1 1 0 00-1.4 1.4A8.92 8.92 0 0121 12a1 1 0 102 0 10.9 10.9 0 00-3.3-7.7ZM5.7 5.7a1 1 0 00-1.4-1.4A10.9 10.9 0 001 12a1 1 0 102 0 8.92 8.92 0 012.7-6.3Z"></path>
                </svg>
                <span data-i18n="playAlertSounds">Play alert sounds</span>
              </span>
              <span class="option-helper" data-i18n="playAlertSoundsHelper">Play short sounds for mentions, keyword matches, and game invites.</span>
            </span>
            <input id="sound" type="checkbox" title="Play short sounds for chat alerts." data-i18n-title="playAlertSoundsTitle">
          </label>
          <label class="option option-toggle" title="Show a brief startup animation when the extension connects to chat. Reduced motion disables it automatically." data-i18n-title="startupShimmerTitle">
            <span class="option-copy">
              <span class="option-title">
                <svg class="option-icon startup-effect-icon" viewBox="0 -960 960 960" aria-hidden="true" focusable="false">
                  <path class="startup-sparkle startup-sparkle-small-start" d="m306-120-44-92-102-44 102-44 44-92 44 92 102 44-102 44-44 92Z"></path>
                  <path class="startup-sparkle startup-sparkle-large" d="m684-200-76-160-168-76 168-76 76-160 76 160 168 76-168 76-76 160Z"></path>
                  <path class="startup-sparkle startup-sparkle-small-end" d="m306-568-44-92-102-44 102-44 44-92 44 92 102 44-102 44-44 92Z"></path>
                </svg>
                <span data-i18n="startupShimmer">Startup animation</span>
              </span>
              <span class="option-helper" data-i18n="startupShimmerHelper">Show a brief edge animation when the extension connects to chat.</span>
            </span>
            <input id="startupEffect" type="checkbox" title="Show a brief startup animation when the extension connects to chat. Reduced motion disables it automatically." data-i18n-title="startupShimmerTitle">
          </label>
        </section>
        </div>

        <div id="bookmarksPanel" class="popup-tab-panel" role="tabpanel" aria-labelledby="bookmarksTab" data-popup-tab-panel hidden>
          <section class="bookmarks-section" aria-labelledby="bookmarks-heading">
            <header class="bookmarks-header">
              <h2 id="bookmarks-heading" data-i18n="bookmarks">Bookmarks</h2>
              <span id="bookmarksCount" class="bookmarks-count" data-i18n="noBookmarkedUsers">No bookmarks yet</span>
            </header>
            <div id="bookmarksList" class="bookmarks-list" aria-live="polite"></div>
          </section>
        </div>

        <div id="playgroundPanel" class="popup-tab-panel" role="tabpanel" aria-labelledby="playgroundTab" data-popup-tab-panel hidden>
          <section class="settings-section" aria-labelledby="playground-heading">
            <h2 id="playground-heading" data-i18n="playground">Playground</h2>
            <label class="option option-toggle" title="Play games with other extension users. Connects to chatenhancer.com while enabled." data-i18n-title="playgroundHelper">
              <span class="option-copy">
                <span class="option-title">
                  <svg class="option-icon playground-option-icon" viewBox="0 -960 960 960" aria-hidden="true" focusable="false">
                    <path d="m272-440 208 120 208-120-168-97v137h-80v-137l-168 97Zm168-189v-17q-44-13-72-49.5T340-780q0-58 41-99t99-41q58 0 99 41t41 99q0 48-28 84.5T520-646v17l280 161q19 11 29.5 29.5T840-398v76q0 22-10.5 40.5T800-252L520-91q-19 11-40 11t-40-11L160-252q-19-11-29.5-29.5T120-322v-76q0-22 10.5-40.5T160-468l280-161Zm0 378L200-389v67l280 162 280-162v-67L520-251q-19 11-40 11t-40-11Zm82.5-486.5Q540-755 540-780t-17.5-42.5Q505-840 480-840t-42.5 17.5Q420-805 420-780t17.5 42.5Q455-720 480-720t42.5-17.5ZM480-160Z"></path>
                  </svg>
                  <span data-i18n="joinPlayground">Join Playground</span>
                  <span class="option-beta-badge">Beta</span>
                </span>
                <span class="option-helper">
                  <span data-i18n="playgroundHelper">Play games with other extension users. Connects to chatenhancer.com while enabled.</span>
                  <a class="option-helper-link" href="https://www.chatenhancer.com/privacy#playground" target="_blank" rel="noreferrer" data-i18n="learnMore">Learn more</a>
                </span>
              </span>
              <input id="playgroundEnabled" type="checkbox" title="Play games with other extension users. Connects to chatenhancer.com while enabled." data-i18n-title="playgroundHelper">
            </label>
            <div id="playgroundProfile" class="playground-profile" hidden>
              <button id="playgroundProfileToggle" class="playground-profile-toggle" type="button" aria-expanded="false" aria-controls="playgroundProfileDetails">
                <span id="playgroundProfileAvatar" class="playground-profile-avatar" aria-hidden="true"></span>
                <span class="playground-profile-copy">
                  <span class="playground-profile-label" data-i18n="playgroundProfile">Your Playground identity</span>
                  <span id="playgroundProfileName" class="playground-profile-name" aria-live="polite"></span>
                </span>
                <span id="playgroundProfileWins" class="playground-profile-wins" title="Wins" aria-label="Wins: 0">
                  <svg class="playground-profile-wins-icon" viewBox="0 -960 960 960" aria-hidden="true" focusable="false">
                    <path d="M280-120v-80h160v-124q-49-11-87.5-41.5T296-442q-75-9-125.5-65.5T120-640v-40q0-33 23.5-56.5T200-760h80v-80h400v80h80q33 0 56.5 23.5T840-680v40q0 76-50.5 132.5T664-442q-18 46-56.5 76.5T520-324v124h160v80H280Zm0-408v-152h-80v40q0 38 22 68.5t58 43.5Zm285 93q35-35 35-85v-240H360v240q0 50 35 85t85 35q50 0 85-35Zm115-93q36-13 58-43.5t22-68.5v-40h-80v152Zm-200-52Z"></path>
                  </svg>
                  <span id="playgroundProfileWinsCount" class="playground-profile-wins-count">0</span>
                </span>
              </button>
              <div id="playgroundProfileDetails" class="playground-profile-details" hidden>
                <p data-i18n="playgroundProfileHelper">Shown to other Playground users. Your YouTube handle is not collected or shared.</p>
                <label class="playground-display-name-field" for="playgroundDisplayName">
                  <span data-i18n="playgroundDisplayName">Display name</span>
                  <input id="playgroundDisplayName" type="text" maxlength="24" autocomplete="off" spellcheck="false" title="How you appear in Playground rooms." data-i18n-title="playgroundDisplayNameTitle">
                </label>
                <p class="playground-display-name-helper" data-i18n="playgroundDisplayNameHelper">Leave blank to use your generated Player name.</p>
              </div>
            </div>
          </section>
          <section id="playgroundGamesSection" class="settings-section" aria-labelledby="playground-games-heading" hidden>
            <h2 id="playground-games-heading" data-i18n="games">Games</h2>
            <label class="option option-toggle" title="When you enter a stream, you’ll appear in the player list and can receive game invites." data-i18n-title="playgroundGamesAvailableHelper">
              <span class="option-copy">
                <span class="option-title">
                  <svg class="option-icon playground-option-icon" viewBox="0 -960 960 960" aria-hidden="true" focusable="false">
                    <path d="M189-160q-60 0-102.5-43T42-307q0-9 1-18t3-18l84-336q14-54 57-87.5t98-33.5h390q55 0 98 33.5t57 87.5l84 336q2 9 3.5 18.5T919-306q0 61-43.5 103.5T771-160q-42 0-78-22t-54-60l-28-58q-5-10-15-15t-21-5H385q-11 0-21 5t-15 15l-28 58q-18 38-54 60t-78 22Zm3-80q19 0 34.5-10t23.5-27l28-57q15-31 44-48.5t63-17.5h190q34 0 63 18t45 48l28 57q8 17 23.5 27t34.5 10q28 0 48-18.5t21-46.5q0 1-2-19l-84-335q-7-27-28-44t-49-17H285q-28 0-49.5 17T208-659l-84 335q-2 6-2 18 0 28 20.5 47t49.5 19Zm376.5-291.5Q580-543 580-560t-11.5-28.5Q557-600 540-600t-28.5 11.5Q500-577 500-560t11.5 28.5Q523-520 540-520t28.5-11.5Zm80-80Q660-623 660-640t-11.5-28.5Q637-680 620-680t-28.5 11.5Q580-657 580-640t11.5 28.5Q603-600 620-600t28.5-11.5Zm0 160Q660-463 660-480t-11.5-28.5Q637-520 620-520t-28.5 11.5Q580-497 580-480t11.5 28.5Q603-440 620-440t28.5-11.5Zm80-80Q740-543 740-560t-11.5-28.5Q717-600 700-600t-28.5 11.5Q660-577 660-560t11.5 28.5Q683-520 700-520t28.5-11.5Zm-367 63Q370-477 370-490v-40h40q13 0 21.5-8.5T440-560q0-13-8.5-21.5T410-590h-40v-40q0-13-8.5-21.5T340-660q-13 0-21.5 8.5T310-630v40h-40q-13 0-21.5 8.5T240-560q0 13 8.5 21.5T270-530h40v40q0 13 8.5 21.5T340-460q13 0 21.5-8.5ZM480-480Z"></path>
                  </svg>
                  <span data-i18n="playgroundGamesAvailable">Available for invites by default</span>
                </span>
                <span class="option-helper" data-i18n="playgroundGamesAvailableHelper">When you enter a stream, you’ll appear in the player list and can receive game invites.</span>
              </span>
              <input id="playgroundGamesAvailable" type="checkbox" title="When you enter a stream, you’ll appear in the player list and can receive game invites." data-i18n-title="playgroundGamesAvailableHelper">
            </label>
          </section>
        </div>
      </div>

      <footer class="footer">
        <p id="version" class="version" aria-label="Extension version" data-i18n-aria-label="extensionVersion"></p>
        <div class="extension-status" data-extension-status="inactive" aria-live="polite">
          <span class="extension-status-dot" aria-hidden="true"></span>
          <span class="extension-status-copy">
            <strong data-extension-status-text data-i18n="extensionStatusInactiveAll">Inactive</strong>
          </span>
        </div>
      </footer>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
