name: ci

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: '17 */6 * * *'
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Cache Playwright browsers
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}
      - name: Install Playwright Chromium
        run: npm run ci:install-playwright
      - name: Verify project
        run: npm run ci:verify
      # Badge JSON is generated by the coverage step inside ci:verify. Pages
      # later downloads this artifact from the same trusted workflow run rather
      # than rerunning tests or coverage in the deploy path.
      - name: Upload docs badge artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: docs-badges
          path: docs/public/badges/
          if-no-files-found: error
          retention-days: 1
      - name: Write test summary
        if: always()
        run: npm run ci:test-summary
      - name: Collect mock browser failure artifacts
        if: failure()
        run: npm run ci:browser-artifacts
      - name: Upload mock browser failure artifacts
        if: failure()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: mock-browser-failure-artifacts
          path: test-results/browser/mock-artifacts/
          if-no-files-found: ignore
          retention-days: 7

  pages-build:
    needs: verify
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      # Use the badge JSON generated by verify in this same workflow run. This
      # keeps the Pages job a docs build only.
      - name: Download docs badge artifact
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6
        with:
          name: docs-badges
          path: docs/public/badges
      - name: Build docs
        run: npm run ci:pages-build
        env:
          YTCQ_DOCS_BUILD_SHA: ${{ github.sha }}
          YTCQ_DOCS_STAMP_SOURCE: '1'
      - name: Configure GitHub Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6
      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: dist/docs

  pages-deploy:
    needs: pages-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    concurrency:
      group: pages
      cancel-in-progress: false
    permissions:
      id-token: write
      pages: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
