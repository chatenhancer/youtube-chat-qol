name: release

on:
  push:
    tags:
      - 'v*'

jobs:
  validate-tag:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22.21.1
          cache: npm
      - name: Validate release tag
        run: npm run ci:release-validate-tag

  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22.21.1
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Check project
        run: npm run check

  unit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22.21.1
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Test with coverage
        run: npm run test:coverage
      - name: Upload unit test report
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: unit-test-report
          path: test-results/unit/vitest-report.json
          if-no-files-found: ignore
          retention-days: 1

  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22.21.1
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build extensions
        run: npm run build

  cloudflare:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22.21.1
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Check Cloudflare Workers
        run: npm run cloudflare:check

  browser:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22.21.1
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Cache Playwright browsers
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}
      - name: Install Playwright Chromium
        run: npm run ci:install-playwright
      - name: Build Chrome extension
        run: npm run build:chrome
      - name: Run browser gate
        run: npm run ci:test-browser-gate
      - name: Upload browser test report
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: browser-test-report
          path: test-results/browser/playwright-report.json
          if-no-files-found: ignore
          retention-days: 1
      - name: Collect mock browser failure artifacts
        if: failure()
        run: npm run ci:browser-artifacts
      - name: Upload mock browser failure artifacts
        if: failure()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: mock-browser-failure-artifacts
          path: test-results/browser/mock-artifacts/
          if-no-files-found: ignore
          retention-days: 7

  verify:
    needs:
      - validate-tag
      - check
      - unit
      - build
      - cloudflare
      - browser
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22.21.1
      - name: Download unit test report
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6
        continue-on-error: true
        with:
          name: unit-test-report
          path: test-results/unit
      - name: Download browser test report
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6
        continue-on-error: true
        with:
          name: browser-test-report
          path: test-results/browser
      - name: Write test summary
        if: always()
        run: node scripts/write-ci-test-summary.mjs
      - name: Check verification jobs
        run: |
          validate_tag_result="${{ needs.validate-tag.result }}"
          check_result="${{ needs.check.result }}"
          unit_result="${{ needs.unit.result }}"
          build_result="${{ needs.build.result }}"
          cloudflare_result="${{ needs.cloudflare.result }}"
          browser_result="${{ needs.browser.result }}"

          printf 'validate-tag: %s\n' "${validate_tag_result}"
          printf 'check: %s\n' "${check_result}"
          printf 'unit: %s\n' "${unit_result}"
          printf 'build: %s\n' "${build_result}"
          printf 'cloudflare: %s\n' "${cloudflare_result}"
          printf 'browser: %s\n' "${browser_result}"

          if [ "${validate_tag_result}" != "success" ] ||
             [ "${check_result}" != "success" ] ||
             [ "${unit_result}" != "success" ] ||
             [ "${build_result}" != "success" ] ||
             [ "${cloudflare_result}" != "success" ] ||
             [ "${browser_result}" != "success" ]; then
            echo "One or more verification jobs failed." >&2
            exit 1
          fi

  package:
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22.21.1
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build release archives
        run: npm run zip:archives
      - name: Upload release archives
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: youtube-chat-qol-packages
          path: dist/release/*.zip

  github-release:
    needs: package
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
      - name: Download release archives
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6
        with:
          name: youtube-chat-qol-packages
          path: dist/release
      - name: Write release notes
        run: |
          previous_tag="$(git tag --list 'v[0-9]*' --sort=version:refname | awk -v current="${GITHUB_REF_NAME}" '
            $0 == current { print previous; found = 1; exit }
            { previous = $0 }
            END { if (!found) exit 1 }
          ')"

          if [ -z "${previous_tag}" ]; then
            echo "Could not find a previous release tag for ${GITHUB_REF_NAME}." >&2
            exit 1
          fi

          changelog_range="${previous_tag}...${GITHUB_REF_NAME}"
          changelog_url="https://github.com/${GITHUB_REPOSITORY}/compare/${changelog_range}"
          printf 'Full changelog: [%s](%s)\n' "${changelog_range}" "${changelog_url}" > release-notes.md
      - name: Create GitHub release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3
        with:
          body_path: release-notes.md
          files: dist/release/*.zip

  publish-chrome:
    needs: package
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22.21.1
      - name: Download release archives
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6
        with:
          name: youtube-chat-qol-packages
          path: dist/release
      - name: Submit to Chrome Web Store
        run: npm run publish:chrome
        env:
          CHROME_WEBSTORE_EXTENSION_ID: ${{ secrets.CHROME_WEBSTORE_EXTENSION_ID }}
          CHROME_WEBSTORE_PUBLISHER_ID: ${{ secrets.CHROME_WEBSTORE_PUBLISHER_ID }}
          CHROME_WEBSTORE_SERVICE_ACCOUNT_JSON: ${{ secrets.CHROME_WEBSTORE_SERVICE_ACCOUNT_JSON }}

  publish-firefox:
    needs: package
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22.21.1
      - name: Download release archives
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6
        with:
          name: youtube-chat-qol-packages
          path: dist/release
      - name: Submit to Firefox Add-ons
        run: npm run publish:firefox
        env:
          FIREFOX_AMO_ADDON_ID: ${{ secrets.FIREFOX_AMO_ADDON_ID }}
          FIREFOX_AMO_API_KEY: ${{ secrets.FIREFOX_AMO_API_KEY }}
          FIREFOX_AMO_API_SECRET: ${{ secrets.FIREFOX_AMO_API_SECRET }}

  publish-safari:
    needs: package
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: macos-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22.21.1
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Configure App Store Connect API key
        env:
          YTCQ_APP_STORE_CONNECT_PRIVATE_KEY: ${{ secrets.YTCQ_APP_STORE_CONNECT_PRIVATE_KEY }}
          # Identifier-like Safari publish settings are secrets so public logs redact them.
          YTCQ_APP_STORE_CONNECT_KEY_ID: ${{ secrets.YTCQ_APP_STORE_CONNECT_KEY_ID }}
        run: |
          if [ -z "${YTCQ_APP_STORE_CONNECT_PRIVATE_KEY}" ]; then
            echo "Missing YTCQ_APP_STORE_CONNECT_PRIVATE_KEY." >&2
            exit 1
          fi

          if [ -z "${YTCQ_APP_STORE_CONNECT_KEY_ID}" ]; then
            echo "Missing YTCQ_APP_STORE_CONNECT_KEY_ID." >&2
            exit 1
          fi

          key_path="${RUNNER_TEMP}/AuthKey_${YTCQ_APP_STORE_CONNECT_KEY_ID}.p8"
          umask 077
          printf '%s\n' "${YTCQ_APP_STORE_CONNECT_PRIVATE_KEY}" > "${key_path}"
          chmod 600 "${key_path}"
          echo "YTCQ_APP_STORE_CONNECT_KEY_PATH=${key_path}" >> "${GITHUB_ENV}"
      - name: Configure Safari signing assets
        run: node scripts/configure-safari-signing-assets.mjs
        env:
          YTCQ_SAFARI_DISTRIBUTION_CERTIFICATE_P12_BASE64: ${{ secrets.YTCQ_SAFARI_DISTRIBUTION_CERTIFICATE_P12_BASE64 }}
          YTCQ_SAFARI_DISTRIBUTION_CERTIFICATES_P12_BASE64: ${{ secrets.YTCQ_SAFARI_DISTRIBUTION_CERTIFICATES_P12_BASE64 }}
          YTCQ_SAFARI_APP_DISTRIBUTION_CERTIFICATE_P12_BASE64: ${{ secrets.YTCQ_SAFARI_APP_DISTRIBUTION_CERTIFICATE_P12_BASE64 }}
          YTCQ_SAFARI_INSTALLER_DISTRIBUTION_CERTIFICATE_P12_BASE64: ${{ secrets.YTCQ_SAFARI_INSTALLER_DISTRIBUTION_CERTIFICATE_P12_BASE64 }}
          YTCQ_SAFARI_CERTIFICATE_PASSWORD: ${{ secrets.YTCQ_SAFARI_CERTIFICATE_PASSWORD }}
          YTCQ_SAFARI_APP_DISTRIBUTION_CERTIFICATE_PASSWORD: ${{ secrets.YTCQ_SAFARI_APP_DISTRIBUTION_CERTIFICATE_PASSWORD }}
          YTCQ_SAFARI_INSTALLER_DISTRIBUTION_CERTIFICATE_PASSWORD: ${{ secrets.YTCQ_SAFARI_INSTALLER_DISTRIBUTION_CERTIFICATE_PASSWORD }}
          YTCQ_SAFARI_SIGNING_KEYCHAIN_PASSWORD: ${{ secrets.YTCQ_SAFARI_SIGNING_KEYCHAIN_PASSWORD }}
          YTCQ_SAFARI_APP_PROVISIONING_PROFILE_BASE64: ${{ secrets.YTCQ_SAFARI_APP_PROVISIONING_PROFILE_BASE64 }}
          YTCQ_SAFARI_EXTENSION_PROVISIONING_PROFILE_BASE64: ${{ secrets.YTCQ_SAFARI_EXTENSION_PROVISIONING_PROFILE_BASE64 }}
          YTCQ_SAFARI_APP_PROVISIONING_PROFILE_BUNDLE_ID: ${{ secrets.YTCQ_SAFARI_APP_PROVISIONING_PROFILE_BUNDLE_ID }}
          YTCQ_SAFARI_EXTENSION_PROVISIONING_PROFILE_BUNDLE_ID: ${{ secrets.YTCQ_SAFARI_EXTENSION_PROVISIONING_PROFILE_BUNDLE_ID }}
          YTCQ_SAFARI_EXPORT_SIGNING_CERTIFICATE: ${{ secrets.YTCQ_SAFARI_EXPORT_SIGNING_CERTIFICATE }}
          YTCQ_SAFARI_EXPORT_INSTALLER_SIGNING_CERTIFICATE: ${{ secrets.YTCQ_SAFARI_EXPORT_INSTALLER_SIGNING_CERTIFICATE }}
      - name: Submit to Mac App Store
        run: npm run publish:safari
        env:
          YTCQ_SAFARI_BUNDLE_ID: ${{ secrets.YTCQ_SAFARI_BUNDLE_ID }}
          YTCQ_SAFARI_DEVELOPMENT_TEAM: ${{ secrets.YTCQ_SAFARI_DEVELOPMENT_TEAM }}
          YTCQ_APP_STORE_CONNECT_KEY_ID: ${{ secrets.YTCQ_APP_STORE_CONNECT_KEY_ID }}
          YTCQ_APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.YTCQ_APP_STORE_CONNECT_ISSUER_ID }}
          YTCQ_APP_STORE_APPLE_ID: ${{ secrets.YTCQ_APP_STORE_APPLE_ID }}
          YTCQ_APP_STORE_BUILD_WAIT_ATTEMPTS: 20
