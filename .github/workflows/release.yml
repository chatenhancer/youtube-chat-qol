name: release

on:
  push:
    tags:
      - 'v*'

jobs:
  package:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22.21.1
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Cache Playwright browsers
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}
      - name: Install Playwright Chromium
        run: npm run ci:install-playwright
      - name: Validate release tag
        if: startsWith(github.ref, 'refs/tags/')
        run: npm run ci:release-validate-tag
      - name: Build release archives
        run: npm run zip
      - name: Write test summary
        if: always()
        run: npm run ci:test-summary
      - name: Collect mock browser failure artifacts
        if: failure()
        run: npm run ci:browser-artifacts
      - name: Upload mock browser failure artifacts
        if: failure()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: mock-browser-failure-artifacts
          path: test-results/browser/mock-artifacts/
          if-no-files-found: ignore
          retention-days: 7
      - name: Upload release archives
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: youtube-chat-qol-packages
          path: dist/release/*.zip

  github-release:
    needs: package
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
      - name: Download release archives
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6
        with:
          name: youtube-chat-qol-packages
          path: dist/release
      - name: Write release notes
        run: |
          previous_tag="$(git tag --list 'v[0-9]*' --sort=version:refname | awk -v current="${GITHUB_REF_NAME}" '
            $0 == current { print previous; found = 1; exit }
            { previous = $0 }
            END { if (!found) exit 1 }
          ')"

          if [ -z "${previous_tag}" ]; then
            echo "Could not find a previous release tag for ${GITHUB_REF_NAME}." >&2
            exit 1
          fi

          changelog_range="${previous_tag}...${GITHUB_REF_NAME}"
          changelog_url="https://github.com/${GITHUB_REPOSITORY}/compare/${changelog_range}"
          printf 'Full changelog: [%s](%s)\n' "${changelog_range}" "${changelog_url}" > release-notes.md
      - name: Create GitHub release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3
        with:
          body_path: release-notes.md
          files: dist/release/*.zip

  publish-chrome:
    needs: package
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22.21.1
      - name: Download release archives
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6
        with:
          name: youtube-chat-qol-packages
          path: dist/release
      - name: Submit to Chrome Web Store
        run: npm run publish:chrome
        env:
          CHROME_WEBSTORE_EXTENSION_ID: ${{ vars.CHROME_WEBSTORE_EXTENSION_ID }}
          CHROME_WEBSTORE_PUBLISHER_ID: ${{ secrets.CHROME_WEBSTORE_PUBLISHER_ID }}
          CHROME_WEBSTORE_SERVICE_ACCOUNT_JSON: ${{ secrets.CHROME_WEBSTORE_SERVICE_ACCOUNT_JSON }}

  publish-firefox:
    needs: package
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22.21.1
      - name: Download release archives
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6
        with:
          name: youtube-chat-qol-packages
          path: dist/release
      - name: Submit to Firefox Add-ons
        run: npm run publish:firefox
        env:
          FIREFOX_AMO_ADDON_ID: ${{ vars.FIREFOX_AMO_ADDON_ID }}
          FIREFOX_AMO_API_KEY: ${{ secrets.FIREFOX_AMO_API_KEY }}
          FIREFOX_AMO_API_SECRET: ${{ secrets.FIREFOX_AMO_API_SECRET }}
          FIREFOX_AMO_APPROVAL_NOTES: ${{ vars.FIREFOX_AMO_APPROVAL_NOTES }}
          FIREFOX_AMO_RELEASE_NOTES: ${{ vars.FIREFOX_AMO_RELEASE_NOTES }}
