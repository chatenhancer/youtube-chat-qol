name: Verify

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright Chromium
        run: npm run test:browser:install
      - name: Build extension
        run: npm run build
      - name: Build docs
        run: npm run docs:build
      - name: Run mock YouTube browser smoke test
        run: npm run test:browser:mock
        env:
          YTCQ_HEADLESS: '1'
