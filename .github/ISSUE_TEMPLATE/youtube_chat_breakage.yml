name: YouTube chat breakage
description: Report a feature that broke after a YouTube page or chat update.
title: "[YouTube breakage]: "
labels: ["bug", "youtube-dom"]
body:
  - type: markdown
    attributes:
      value: |
        Use this when a feature worked before but no longer appears or behaves correctly on YouTube live chat. YouTube changes its DOM often, so specific page details help.

  - type: dropdown
    id: feature
    attributes:
      label: Affected feature
      options:
        - Translation
        - Mention / Quote message menu
        - Author click or Alt/Option-click
        - Avatar profile card
        - Inbox / keyword highlights
        - Inbox sound
        - Keep chat live
        - Frequent emoji row
        - Chat commands
        - Extension popup
        - Other
    validations:
      required: true

  - type: textarea
    id: symptoms
    attributes:
      label: What broke?
      description: Describe what is missing, clipped, frozen, or behaving differently.
      placeholder: "Example: The Quote and Mention actions no longer appear in the message menu."
    validations:
      required: true

  - type: textarea
    id: where
    attributes:
      label: Where does it happen?
      description: Mention whether this happens in normal watch page chat, popout chat, fullscreen/theater mode, or only on specific streams.
      placeholder: "Normal watch page chat on a live stream."
    validations:
      required: true

  - type: input
    id: video-url
    attributes:
      label: Example video or livestream URL
      description: Optional. Only include a URL if it is public and safe to share.
      placeholder: "https://www.youtube.com/watch?v=..."

  - type: textarea
    id: dom-details
    attributes:
      label: Console errors or DOM details
      description: If you know how to inspect the page, paste relevant errors/selectors. This is optional.
      render: shell

  - type: dropdown
    id: browser
    attributes:
      label: Browser
      options:
        - Chrome
        - Edge
        - Firefox
        - Other
    validations:
      required: true

  - type: input
    id: extension-version
    attributes:
      label: Extension version
      placeholder: "0.7.0"
    validations:
      required: true

  - type: textarea
    id: related-settings
    attributes:
      label: Related settings or keywords
      description: If the issue involves translation, inbox, keywords, sound, emoji, or keep-chat-live behavior, include the relevant settings.
      placeholder: "Translate chat: on; inbox sound: on; watched keywords: robot, battery"

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots or screen recording
      description: Attach a screenshot if it shows the broken UI. Please avoid sharing private information.
