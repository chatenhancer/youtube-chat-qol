name: Bug report
description: Report anything in the extension that is not working as expected.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please include enough detail to reproduce the issue without exposing private chat content.

  - type: dropdown
    id: affected-area
    attributes:
      label: What part is affected?
      options:
        - Extension button missing or inactive
        - Translation
        - Draft translation
        - Mention / Quote message menu
        - Author click or Alt/Option-click
        - Focus mode
        - Avatar profile card / recent messages
        - Inbox / keyword highlights
        - Inbox sound
        - Tab alerts / background chat updates
        - Frequent emoji row
        - Chat commands
        - Extension popup
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: What happened?
      description: Describe the problem and what you expected to happen instead.
      placeholder: "Example: The Inbox button appears, but clicking it does not open the inbox."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the smallest set of steps that reproduces the issue.
      placeholder: |
        1. Open a YouTube livestream.
        2. Enable ...
        3. Click ...
        4. See ...
    validations:
      required: true

  - type: dropdown
    id: youtube-ui-change
    attributes:
      label: Did this start after YouTube's chat UI looked different?
      options:
        - Not sure
        - "Yes"
        - "No"
    validations:
      required: true

  - type: dropdown
    id: chat-location
    attributes:
      label: Where does it happen?
      options:
        - Normal watch page live chat
        - Live chat replay
        - Popout chat
        - Theater or fullscreen layout
        - Extension popup
        - Not sure
        - Other
    validations:
      required: true

  - type: input
    id: video-url
    attributes:
      label: Example video or livestream URL
      description: Optional. Only include a URL if it is public and safe to share.
      placeholder: "https://www.youtube.com/watch?v=..."

  - type: dropdown
    id: browser
    attributes:
      label: Browser
      options:
        - Chrome
        - Edge
        - Firefox
        - Other
    validations:
      required: true

  - type: input
    id: extension-version
    attributes:
      label: Extension version
      description: You can find this in the extension popup.
      placeholder: "0.7.0"
    validations:
      required: true

  - type: dropdown
    id: install-source
    attributes:
      label: Install source
      options:
        - Chrome Web Store
        - Firefox Add-ons
        - Edge / Chrome Web Store
        - Built from source
        - Loaded unpacked during development
        - Other
    validations:
      required: true

  - type: textarea
    id: settings
    attributes:
      label: Relevant settings
      description: Mention any related settings, such as translation target, display mode, draft translation, inbox sound, watched keywords, startup effect, or opening channels in a popup window.
      placeholder: "Translate to: English; display mode: replace; inbox sound: off; keywords: robot, coffee"

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots or screen recording
      description: If useful, attach screenshots. Please avoid sharing private information.

  - type: textarea
    id: console-errors
    attributes:
      label: Console errors or technical details
      description: Optional. If you know how to inspect the page, paste relevant console errors or DOM details.
      render: shell

  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Add anything else that may help reproduce or understand the bug.
